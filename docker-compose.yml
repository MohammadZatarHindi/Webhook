version: '3.9'

services:
  api:
    build: .
    container_name: webhook_api
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db
      - redis

  worker:
    build: .
    container_name: webhook_worker
    restart: always
    # 'tail -f /dev/null' keeps the container running but idle
    command: tail -f /dev/null
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db
      - redis
    
  subscriber:
    build: .
    container_name: webhook_subscriber
    restart: always
    # Stays idle so you can start it manually
    command: tail -f /dev/null
    ports:
      - "4000:4000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - api
      
  db:
    image: postgres:16
    container_name: webhook_postgres
    restart: always
    environment:
      - POSTGRES_USER=mohammad
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=webhook_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7
    container_name: webhook_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: